kind = "web"
previewPath = "/"
title = "Insight Exam"
version = "1.0.0"
id = "artifacts/insight-exam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20245

[services.development]
run = "pnpm --filter @workspace/insight-exam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/insight-exam", "run", "build" ]
publicDir = "artifacts/insight-exam/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20245"
BASE_PATH = "/"
